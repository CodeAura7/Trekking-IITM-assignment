{% extends 'base.html' %}
{% block content %}
<h2>Bookings</h2>
<ul class="list-group">
  {% for booking in bookings %}
    <li class="list-group-item">
      {{ booking.user.username }} booked {{ booking.trek.name }} on {{ booking.booked_at.strftime('%Y-%m-%d') }}
    </li>
  {% endfor %}
</ul>
{% endblock %}
