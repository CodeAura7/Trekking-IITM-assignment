{% extends 'base.html' %}
{% block content %}
<h2>Edit Trek</h2>
<form method="post">
  <div class="mb-3"><label class="form-label">Name</label><input class="form-control" name="name" value="{{ trek.name }}" required></div>
  <div class="mb-3"><label class="form-label">Location</label><input class="form-control" name="location" value="{{ trek.location }}" required></div>
  <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" name="description" required>{{ trek.description }}</textarea></div>
  <div class="mb-3"><label class="form-label">Duration Days</label><input class="form-control" type="number" name="duration_days" value="{{ trek.duration_days }}" required></div>
  <div class="mb-3"><label class="form-label">Price</label><input class="form-control" type="number" step="0.01" name="price" value="{{ trek.price }}" required></div>
  <div class="mb-3"><label class="form-label">Capacity</label><input class="form-control" type="number" name="capacity" value="{{ trek.capacity }}" required></div>
  <div class="mb-3"><label class="form-label">Available Slots</label><input class="form-control" type="number" min="0" name="available_slots" value="{{ trek.available_slots }}"></div>
  <div class="mb-3"><label class="form-label">Difficulty</label><select class="form-select" name="difficulty"><option value="Easy" {% if trek.difficulty=='Easy' %}selected{% endif %}>Easy</option><option value="Moderate" {% if trek.difficulty=='Moderate' %}selected{% endif %}>Moderate</option><option value="Hard" {% if trek.difficulty=='Hard' %}selected{% endif %}>Hard</option></select></div>
  <div class="mb-3"><label class="form-label">Status</label><select class="form-select" name="status"><option value="Open" {% if trek.status=='Open' %}selected{% endif %}>Open</option><option value="Closed" {% if trek.status=='Closed' %}selected{% endif %}>Closed</option><option value="In Progress" {% if trek.status=='In Progress' %}selected{% endif %}>In Progress</option><option value="Completed" {% if trek.status=='Completed' %}selected{% endif %}>Completed</option></select></div>
  <div class="mb-3"><label class="form-label">Start Date</label><input class="form-control" type="date" name="start_date" value="{{ trek.start_date.strftime('%Y-%m-%d') if trek.start_date else '' }}"></div>
  <div class="mb-3"><label class="form-label">End Date</label><input class="form-control" type="date" name="end_date" value="{{ trek.end_date.strftime('%Y-%m-%d') if trek.end_date else '' }}"></div>
  <button class="btn btn-success">Save</button>
  <a href="{{ url_for('admin.manage_treks') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
