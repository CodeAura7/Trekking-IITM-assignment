{% extends 'base.html' %}
{% block content %}
<h2>Manage Users</h2>
<form method="get" class="mb-3">
  <input class="form-control" name="query" placeholder="Search users by name or email" value="{{ query }}">
</form>
<ul class="list-group">
  {% for user in users %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <span>{{ user.username }} ({{ user.email }}) <span class="badge bg-secondary">{{ user.role }}</span></span>
      {% if user.is_blacklisted %}
        <form method="post" action="{{ url_for('admin.unblacklist_user', user_id=user.id) }}"><button class="btn btn-sm btn-outline-success">Unblacklist</button></form>
      {% else %}
        <form method="post" action="{{ url_for('admin.blacklist_user', user_id=user.id) }}"><button class="btn btn-sm btn-outline-danger">Blacklist</button></form>
      {% endif %}
    </li>
  {% endfor %}
</ul>
{% endblock %}
